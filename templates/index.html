<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yt-dlp Web Downloader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>yt-dlp Web Downloader</h1>
            <p>Paste a URL and hit Enter to start downloading</p>
        </header>

        <main>
            <div class="download-form">
                <form id="downloadForm">
                    <div class="input-row">
                        <input type="url" id="urlInput"
                               placeholder="Paste video URL and press Enter..."
                               autocomplete="off" autofocus required>
                        <button type="submit" id="downloadBtn">
                            <span id="downloadBtnText">Download</span>
                            <span id="downloadBtnSpinner" class="spinner" style="display: none;">...</span>
                        </button>
                    </div>
                </form>

                <div class="bulk-section">
                    <button type="button" id="bulkToggleBtn" class="bulk-toggle">+ Bulk Add</button>
                    <div id="bulkPanel" class="bulk-panel" style="display: none;">
                        <textarea id="urls" rows="4"
                                  placeholder="One URL per line..."></textarea>
                        <div class="bulk-actions">
                            <button type="button" id="bulkDownloadBtn">Queue All</button>
                            <button type="button" id="previewBtn">Preview Info</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="status-section">
                <div class="section-header">
                    <h2>Downloads</h2>
                    <button id="refreshBtn" class="refresh-btn">Refresh</button>
                </div>

                <div id="jobsList" class="jobs-list">
                    <div class="no-jobs">
                        No downloads yet. Paste a URL above to get started.
                    </div>
                </div>
            </div>

            <div id="previewModal" class="modal" style="display: none;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>Video Preview</h3>
                        <button id="closeModal" class="close-btn">&times;</button>
                    </div>
                    <div id="previewContent" class="modal-body"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
